name: Data validation comment

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read

jobs:
  comment:
    name: Comment on data validation failures
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event.workflow_run.event == 'pull_request' &&
        github.event.workflow_run.conclusion == 'failure'
      }}
    permissions:
      actions: read
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: set node.js 22
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Download data validation output
        id: validation_output
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          mkdir -p data-validation-artifact
          if gh run download "$RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name data-validation-output \
            --dir data-validation-artifact; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve pull request
        id: pull_request
        if: ${{ steps.validation_output.outputs.found == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_OWNER: ${{ github.event.workflow_run.head_repository.owner.login }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          pr_number="$(
            gh api \
              "repos/$GITHUB_REPOSITORY/pulls?state=all&head=$HEAD_OWNER:$HEAD_BRANCH" \
              --jq '.[0].number // ""'
          )"
          if [ -z "$pr_number" ]; then
            echo "No pull request found for $HEAD_OWNER:$HEAD_BRANCH."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "found=true" >> "$GITHUB_OUTPUT"

      - name: Comment on data validation failures
        if: ${{ steps.pull_request.outputs.found == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_DISPATCH_ACCESS_TOKEN }}
          PR_NUMBER: ${{ steps.pull_request.outputs.number }}
        run: |
          set -euo pipefail
          node scripts/data-validation-pr-comment.js \
            --validation-output data-validation-artifact/data-validation-output.txt \
            --repo "$GITHUB_REPOSITORY" \
            --issue "$PR_NUMBER"
