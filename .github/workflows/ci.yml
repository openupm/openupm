name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate-data:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, 'skip ci') }}
    name: Data validation
    steps:
    - uses: actions/checkout@v4
    - name: checkout openupm-next validator source
      uses: actions/checkout@v4
      with:
        repository: openupm/openupm-next
        ref: main
        path: tmp-openupm-next
    - name: set node.js 22
      uses: actions/setup-node@v3
      with:
        node-version: 22
        cache: npm
    - name: npm install
      run: npm install
    - name: npm install openupm-next
      run: npm install
      working-directory: tmp-openupm-next
    - name: build openupm-next validator
      run: npm run build -- --filter @openupm/local-data
      working-directory: tmp-openupm-next
    - name: npm test
      run: OPENUPM_NEXT_PATH=tmp-openupm-next npm test

  build-website:
    runs-on: ubuntu-latest
    needs: validate-data
    if: github.ref == 'refs/heads/master' && github.repository == 'openupm/openupm'
    steps:
      - uses: convictional/trigger-workflow-and-wait@v1.6.5
        with:
          owner: openupm
          repo: openupm-next
          github_token: ${{ secrets.WORKFLOW_DISPATCH_ACCESS_TOKEN }}
          workflow_file_name: ci.yml
          ref: main
          wait_workflow: false

  deploy-openupm-data:
    runs-on: ubuntu-latest
    needs: validate-data
    if: github.ref == 'refs/heads/master' && github.repository == 'openupm/openupm' && github.event_name == 'push'
    concurrency:
      group: openupm-data-production
      cancel-in-progress: false
    steps:
      - name: Configure SSH
        env:
          OPENUPM_DEPLOY_KNOWN_HOSTS: ${{ secrets.OPENUPM_DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "$OPENUPM_DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Configure SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.OPENUPM_DEPLOY_SSH_KEY }}
          log-public-key: false

      - name: Update production OpenUPM data checkout
        env:
          OPENUPM_DEPLOY_HOST: ${{ secrets.OPENUPM_DEPLOY_HOST }}
        run: |
          set -euo pipefail
          ssh \
            -o StrictHostKeyChecking=yes \
            "openupm-deploy@${OPENUPM_DEPLOY_HOST}" \
            openupm-data-deploy
